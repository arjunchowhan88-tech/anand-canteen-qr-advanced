<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Anand Canteen - Order & Kitchen</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  
  <style>
    body { background: #0f0f0f; color: #e5e5e5; font-family: system-ui, sans-serif; margin: 0; }
    .header { background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #333; }
    .card { 
      background: #1a1a1a; 
      border-radius: 1rem; 
      overflow: hidden; 
      transition: all 0.3s; 
      position: relative; 
      box-shadow: 0 10px 15px rgba(0,0,0,0.3);
    }
    .card:hover { transform: translateY(-8px); box-shadow: 0 25px 50px rgba(249,115,22,0.2); }
    .image-container { height: 280px; overflow: hidden; }
    .image-container img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
    .card:hover .image-container img { transform: scale(1.1); }
    .badge { 
      position: absolute; 
      top: 1rem; 
      right: 1rem; 
      padding: 0.4rem 0.9rem; 
      font-size: 0.9rem; 
      font-weight: 700; 
      border-radius: 9999px; 
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }
    .veg { background: #22c55e; color: #000; }
    .nonveg { background: #ef4444; color: white; }
    .content { padding: 1.25rem; }
    .title { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.5rem; }
    .price { font-size: 1.6rem; font-weight: 800; color: #f97316; margin-bottom: 0.75rem; }
    .desc { font-size: 0.95rem; color: #bbb; line-height: 1.5; margin-bottom: 1rem; }
    .btn { background: #f97316; color: white; padding: 0.85rem; border-radius: 0.5rem; font-weight: bold; width: 100%; transition: all 0.2s; }
    .btn:hover { background: #ea580c; transform: translateY(-2px); }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 1000; align-items: center; justify-content: center; padding: 1rem; }
    .modal-content { background: #1f1f1f; border-radius: 1rem; width: 100%; max-width: 36rem; max-height: 92vh; overflow-y: auto; padding: 1.75rem; }
    .order-card { background: #1a1a1a; border-radius: 0.75rem; padding: 1.25rem; margin-bottom: 1.25rem; border-left: 6px solid #f97316; }
    .status-new { border-left-color: #ef4444; }
    .status-preparing { border-left-color: #f59e0b; }
    .status-ready { border-left-color: #22c55e; }
    .status-delivered { border-left-color: #6b7280; opacity: 0.7; }
  </style>
</head>
<body>

  <header class="header sticky top-0 z-50">
    <div class="container py-4 flex items-center justify-between">
      <h1 class="text-3xl md:text-4xl font-bold text-orange-500">Anand Canteen</h1>
      <div class="text-sm md:text-base text-gray-400">
        Table: <span id="table" class="text-orange-400 font-bold">—</span>
      </div>
    </div>
  </header>

  <!-- Mode Switch -->
  <div class="container py-6 flex flex-wrap gap-4 justify-center">
    <button onclick="showCustomerMode()" class="px-10 py-4 bg-orange-600 hover:bg-orange-500 rounded-xl font-bold text-lg transition">Customer Mode</button>
    <button onclick="showKitchenMode()" class="px-10 py-4 bg-gray-700 hover:bg-gray-600 rounded-xl font-bold text-lg transition">Kitchen / Admin Mode</button>
  </div>

  <!-- Customer Mode -->
  <div id="customer-mode" class="container">
    <input 
      id="search" 
      type="text" 
      placeholder="Search dishes (e.g. Misal Pav)..." 
      class="w-full p-4 bg-gray-900 border border-gray-700 rounded-2xl text-white placeholder-gray-500 focus:border-orange-500 transition mb-6"
      oninput="filterMenu()"
    />

    <div class="flex flex-wrap gap-3 mb-8 justify-center">
      <button class="filter-btn px-10 py-3 bg-gray-800 border border-gray-700 rounded-full text-base font-medium transition-all active:scale-95 active" data-filter="all">All</button>
      <button class="filter-btn px-10 py-3 bg-gray-800 border border-gray-700 rounded-full text-base font-medium transition-all active:scale-95" data-filter="veg">Veg Only</button>
      <button class="filter-btn px-10 py-3 bg-gray-800 border border-gray-700 rounded-full text-base font-medium transition-all active:scale-95" data-filter="nonveg">Non-Veg</button>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 pb-32" id="menu-grid"></div>

    <button onclick="openCart()" class="fixed bottom-8 right-8 bg-orange-600 hover:bg-orange-500 text-white p-6 rounded-full shadow-2xl z-50 transition transform hover:scale-110">
      <i class="fas fa-shopping-cart text-3xl"></i>
      <span id="cart-count" class="absolute -top-2 -right-2 bg-red-600 text-xs font-bold rounded-full w-8 h-8 flex items-center justify-center border-4 border-black">0</span>
    </button>
  </div>

  <!-- Admin/Kitchen Mode -->
  <div id="kitchen-mode" class="hidden container">
    <h2 class="text-3xl font-bold text-center text-orange-500 mb-8">Kitchen Dashboard - Live Orders</h2>
    <button onclick="location.reload()" class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-lg mb-6">Refresh Orders</button>
    <div id="orders-list" class="space-y-6"></div>
  </div>

  <!-- Cart Modal -->
  <div id="cart-modal" class="modal">
    <div class="modal-content">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl md:text-3xl font-bold text-orange-400">Your Cart • Table <span id="modal-table"></span></h2>
        <button onclick="closeCart()" class="text-4xl text-gray-400 hover:text-white">×</button>
      </div>
      <div id="cart-items" class="mb-8 space-y-6"></div>
      <div class="flex justify-between text-2xl font-bold mb-6">
        <span>Total:</span>
        <span id="total-price">₹0</span>
      </div>
      <input id="phone" type="tel" placeholder="Phone number (optional)" class="w-full p-4 bg-gray-800 border border-gray-700 rounded-xl mb-6 text-white text-lg"/>
      
      <div class="text-center mb-8">
        <h4 class="text-2xl font-bold text-green-400 mb-4">Pay via UPI</h4>
        <p class="text-gray-300 mb-4 text-lg">Scan with PhonePe, Google Pay or any UPI app</p>
        <img 
          src="images/upi-qr.jpeg" 
          alt="UPI QR Code for Payment" 
          class="mx-auto w-72 h-72 md:w-80 md:h-80 object-contain border-4 border-green-600 rounded-2xl shadow-2xl mb-6"
          onerror="this.src='https://via.placeholder.com/400x400/1a1a1a/ffffff?text=QR+Not+Found+-+Check+file+name';"
        >
        <p class="text-xl font-semibold text-orange-400">
          Amount: ₹<span id="total-price-qr">0</span>
        </p>
      </div>

      <button onclick="payNow()" class="btn text-xl py-5">Pay & Place Order</button>
    </div>
  </div>

  <script>
    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyCOKzlZPt697OU0ZsPF71oQnFgujj408Sw",
      authDomain: "anand-canteen-qr-advanced.firebaseapp.com",
      databaseURL: "https://anand-canteen-qr-advanced-default-rtdb.firebaseio.com",
      projectId: "anand-canteen-qr-advanced",
      storageBucket: "anand-canteen-qr-advanced.firebasestorage.app",
      messagingSenderId: "332035287761",
      appId: "1:332035287761:web:6714c3639d0420abc0f3f0",
      measurementId: "G-EMX68TT0G0"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const TABLE = new URLSearchParams(location.search).get('table') || '—';
    document.getElementById('table').textContent = TABLE;
    document.getElementById('modal-table').textContent = TABLE;

    let cart = [];
    let isAdmin = false;

    // Admin Password (CHANGE THIS!)
    const ADMIN_PASSWORD = "admin123";

    function showKitchenMode() {
      const password = prompt("Enter Admin / Kitchen Password:");
      if (password === ADMIN_PASSWORD) {
        isAdmin = true;
        document.getElementById('customer-mode').classList.add('hidden');
        document.getElementById('kitchen-mode').classList.remove('hidden');
        loadOrders();
      } else {
        alert("Wrong password! Try again.");
      }
    }

    function showCustomerMode() {
      document.getElementById('kitchen-mode').classList.add('hidden');
      document.getElementById('customer-mode').classList.remove('hidden');
    }

    // Menu - only your 8 items
    const menu = [
      { name: "Anda Kari", price: 80, veg: false, desc: "Spicy egg curry", img: "images/anda kari.jpg" },
      { name: "Chicken", price: 150, veg: false, desc: "Fresh chicken curry", img: "images/chicken.jpg" },
      { name: "Biryani", price: 180, veg: false, desc: "Aromatic chicken biryani", img: "images/biryani.jpg" },
      { name: "Paneer Tikka", price: 120, veg: true, desc: "Grilled paneer with spices", img: "images/paneer tickka.jpg" },
      { name: "Gulab Jamun", price: 60, veg: true, desc: "Sweet milk dumplings", img: "images/gulabjamun.jpg" },
      { name: "Chai", price: 12, veg: true, desc: "Hot masala chai", img: "images/chai.jpg" },
      { name: "Misal Pav", price: 65, veg: true, desc: "Spicy misal with pav", img: "images/misal pav.jpg" },
      { name: "Poha", price: 45, veg: true, desc: "Onion, sev, peanuts poha", img: "images/poha.jpg" }
    ];

    function renderMenu(filtered = menu) {
      document.getElementById('menu-grid').innerHTML = filtered.map(item => `
        <div class="card">
          <div class="image-container">
            <img src="${item.img}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/400x300/1a1a1a/ffffff?text=${encodeURIComponent(item.name)}';">
          </div>
          <span class="badge ${item.veg ? 'veg' : 'nonveg'}">${item.veg ? 'Veg' : 'Non-Veg'}</span>
          <div class="content">
            <div class="title">${item.name}</div>
            <div class="price">₹${item.price}</div>
            <div class="desc">${item.desc}</div>
            <button class="btn mt-4" onclick="addToCart('${item.name.replace(/'/g, "\\'")}', ${item.price}, ${item.veg}, '${item.desc.replace(/'/g, "\\'")}', '${item.img.replace(/'/g, "\\'")}')">
              Add to Cart
            </button>
          </div>
        </div>
      `).join('');
    }

    function addToCart(name, price, veg, desc, img) {
      cart.push({name, price, veg, desc, img});
      document.getElementById('cart-count').textContent = cart.length;
      alert(`${name} added to cart!`);
    }

    function openCart() {
      const modal = document.getElementById('cart-modal');
      const itemsDiv = document.getElementById('cart-items');
      let total = 0;
      let html = '';

      cart.forEach((item, i) => {
        total += item.price;
        html += `
          <div class="flex justify-between items-center mb-4 border-b border-gray-700 pb-2">
            <div>
              <p class="font-bold">${item.name}</p>
              <p class="text-sm text-gray-400">${item.desc}</p>
            </div>
            <div class="text-right">
              <p class="font-bold text-orange-400">₹${item.price}</p>
              <button onclick="removeItem(${i})" class="text-red-500 text-sm">Remove</button>
            </div>
          </div>
        `;
      });

      itemsDiv.innerHTML = html || '<p class="text-center text-gray-400 py-8">Your cart is empty</p>';
      document.getElementById('total-price').textContent = total;
      document.getElementById('total-price-qr').textContent = total;
      modal.style.display = 'flex';
    }

    function closeCart() {
      document.getElementById('cart-modal').style.display = 'none';
    }

    function removeItem(index) {
      cart.splice(index, 1);
      openCart();
      document.getElementById('cart-count').textContent = cart.length;
    }

    function payNow() {
      if (cart.length === 0) return alert("Cart is empty!");

      const total = cart.reduce((sum, item) => sum + item.price, 0);
      const phone = document.getElementById('phone').value || "guest";

      const upiId = "8999540672@ybl";  // CHANGE TO YOUR REAL UPI ID

      const name = "Anand Canteen";
      const note = `Table Order - Ph: ${phone}`;

      const upiLink = `upi://pay?pa=${upiId}&pn=${encodeURIComponent(name)}&am=${total}&cu=INR&tn=${encodeURIComponent(note)}`;

      window.location.href = upiLink;

      setTimeout(() => {
        if (confirm("Payment successful? Confirm order?")) {
          const orderId = 'order_' + Date.now();

          db.ref('orders/' + orderId).set({
            table: TABLE,
            items: cart,
            total: total,
            phone,
            status: "paid_upi",
            timestamp: Date.now(),
            paymentMethod: "UPI_Scan"
          }).catch(err => console.error("Firebase error:", err));

          alert("Order confirmed! Thank you! 🎉");
          cart = [];
          document.getElementById('cart-count').textContent = '0';
          closeCart();
        }
      }, 12000);
    }

    // Filter Buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const filter = btn.dataset.filter;
        let filtered = menu;
        if (filter === 'veg') filtered = menu.filter(i => i.veg);
        if (filter === 'nonveg') filtered = menu.filter(i => !i.veg);
        renderMenu(filtered);
      };
    });

    // Load Kitchen Orders
    function loadOrders() {
      db.ref('orders').orderByChild('timestamp').on('value', (snapshot) => {
        const ordersList = document.getElementById('orders-list');
        ordersList.innerHTML = '';

        const orders = snapshot.val() || {};
        const sorted = Object.entries(orders)
          .map(([id, data]) => ({ id, ...data }))
          .sort((a, b) => b.timestamp - a.timestamp);

        if (sorted.length === 0) {
          ordersList.innerHTML = '<p class="text-center text-gray-400 py-10">No orders yet...</p>';
          return;
        }

        sorted.forEach(order => {
          const statusClass = `status-${order.status || 'new'}`;
          const statusText = {
            new: 'New',
            preparing: 'Preparing',
            ready: 'Ready',
            delivered: 'Delivered'
          }[order.status || 'new'];

          const card = document.createElement('div');
          card.className = `order-card ${statusClass}`;
          card.innerHTML = `
            <div class="flex justify-between items-start mb-4">
              <div>
                <h3 class="text-xl font-bold">Table: ${order.table || '—'}</h3>
                <p class="text-sm text-gray-400">Order ID: ${order.id || '—'}</p>
                <p class="text-sm text-gray-400 mt-1">Phone: ${order.phone || 'guest'}</p>
              </div>
              <div class="text-right">
                <p class="text-lg font-bold text-orange-400">₹${order.total || 0}</p>
                <span class="inline-block px-3 py-1 mt-2 rounded-full text-sm font-medium bg-gray-700">
                  ${statusText}
                </span>
              </div>
            </div>

            <div class="mb-4">
              <h4 class="font-semibold mb-2">Items:</h4>
              <ul class="list-disc pl-5 text-sm">
                ${order.items.map(item => `<li>${item.name} - ₹${item.price}</li>`).join('')}
              </ul>
            </div>

            <div class="flex flex-wrap gap-3">
              <button onclick="updateStatus('${order.id}', 'preparing')" class="bg-yellow-600 hover:bg-yellow-500 px-4 py-2 rounded">Preparing</button>
              <button onclick="updateStatus('${order.id}', 'ready')" class="bg-green-600 hover:bg-green-500 px-4 py-2 rounded">Ready</button>
              <button onclick="updateStatus('${order.id}', 'delivered')" class="bg-gray-600 hover:bg-gray-500 px-4 py-2 rounded">Delivered</button>
            </div>
          `;
          ordersList.appendChild(card);
        });
      });
    }

    function updateStatus(orderId, newStatus) {
      if (confirm(`Mark order as ${newStatus}?`)) {
        db.ref(`orders/${orderId}`).update({
          status: newStatus,
          updatedAt: Date.now()
        }).then(() => alert("Status updated!"))
          .catch(err => alert("Error: " + err.message));
      }
    }

    // Initial render
    renderMenu();
  </script>
</body>
</html>
