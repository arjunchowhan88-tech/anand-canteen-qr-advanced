<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anand Canteen • Order Now</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  
  <style>
    body { background: #0f0f0f; color: #e5e5e5; font-family: system-ui, sans-serif; margin: 0; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { text-align: center; color: #f97316; margin-bottom: 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
    .card {
      background: #1a1a1a;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
      transition: transform 0.3s;
      position: relative;
    }
    .card:hover { transform: translateY(-8px); }
    .card img { width: 100%; height: 200px; object-fit: cover; }
    .content { padding: 15px; }
    .title { font-size: 1.3rem; font-weight: bold; margin-bottom: 8px; }
    .price { font-size: 1.2rem; color: #f97316; margin-bottom: 8px; }
    .desc { font-size: 0.95rem; color: #bbb; margin-bottom: 12px; }
    .btn {
      background: #f97316;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
    }
    .btn:hover { background: #ea580c; }
    .veg { background: #22c55e; color: black; padding: 4px 10px; border-radius: 999px; font-size: 0.8rem; position: absolute; top: 10px; right: 10px; }
    .nonveg { background: #ef4444; color: white; padding: 4px 10px; border-radius: 999px; font-size: 0.8rem; position: absolute; top: 10px; right: 10px; }
    #cart-modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.9);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-content {
      background: #222;
      border-radius: 12px;
      width: 100%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 20px;
    }
    .filter-btn.active { background: #f97316 !important; color: black !important; border-color: #f97316 !important; }
  </style>
</head>
<body>

  <div class="container">
    <h1>Anand Canteen</h1>

    <!-- Filters -->
    <div class="flex flex-wrap gap-3 mb-6 justify-center">
      <button class="filter-btn px-6 py-2 bg-gray-800 border border-gray-700 rounded-full text-sm font-medium transition-all active:scale-95 active" data-filter="all">All</button>
      <button class="filter-btn px-6 py-2 bg-gray-800 border border-gray-700 rounded-full text-sm font-medium transition-all active:scale-95" data-filter="veg">Veg Only</button>
      <button class="filter-btn px-6 py-2 bg-gray-800 border border-gray-700 rounded-full text-sm font-medium transition-all active:scale-95" data-filter="nonveg">Non-Veg</button>
    </div>

    <div class="grid" id="menu-grid"></div>

    <!-- Floating Cart Button -->
    <button onclick="openCart()" class="fixed bottom-6 right-6 bg-orange-600 text-white p-5 rounded-full shadow-2xl z-50">
      <i class="fas fa-shopping-cart text-2xl"></i>
      <span id="cart-count" class="absolute -top-2 -right-2 bg-red-600 text-xs font-bold rounded-full w-6 h-6 flex items-center justify-center">0</span>
    </button>

    <!-- Cart Modal -->
    <div id="cart-modal">
      <div class="modal-content">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-2xl font-bold text-orange-400">Your Cart • Table <span id="modal-table"></span></h2>
          <button onclick="closeCart()" class="text-3xl text-gray-400 hover:text-white">×</button>
        </div>
        <div id="cart-items" class="mb-6"></div>
        <div class="flex justify-between text-xl font-bold mb-4">
          <span>Total:</span>
          <span id="total-price">₹0</span>
        </div>
        <input id="phone" type="tel" placeholder="Phone number (optional)" class="w-full p-3 bg-gray-800 border border-gray-700 rounded mb-4 text-white">
        
        <!-- UPI QR Section -->
        <div class="text-center mb-6">
          <h4 class="text-xl font-bold text-green-400 mb-3">UPI Se Payment Karo</h4>
          <p class="text-gray-300 mb-4">PhonePe, Google Pay ya kisi bhi app se scan karo</p>
          
          <img 
            src="images/upi-qr.jpeg" 
            alt="UPI QR Code" 
            class="mx-auto w-64 h-64 object-contain border-4 border-green-600 rounded-xl shadow-2xl mb-4"
            onerror="this.src='https://via.placeholder.com/300x300/1a1a1a/ffffff?text=UPI+QR';"
          >
          
          <p class="text-lg font-semibold text-orange-400">
            Amount: ₹<span id="total-price-qr">0</span>
          </p>
        </div>

        <button onclick="payNow()" class="btn text-lg">Pay & Place Order</button>
      </div>
    </div>
  </div>

  <script>
    // Firebase Setup
    const firebaseConfig = {
      apiKey: "AIzaSyCOKzlZPt697OU0ZsPF71oQnFgujj408Sw",
      authDomain: "anand-canteen-qr-advanced.firebaseapp.com",
      databaseURL: "https://anand-canteen-qr-advanced-default-rtdb.firebaseio.com",
      projectId: "anand-canteen-qr-advanced",
      storageBucket: "anand-canteen-qr-advanced.firebasestorage.app",
      messagingSenderId: "332035287761",
      appId: "1:332035287761:web:6714c3639d0420abc0f3f0",
      measurementId: "G-EMX68TT0G0"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let cart = [];

    // Sirf tere 8 items
    const menu = [
      { name: "Anda Kari", price: 80, veg: false, desc: "Spicy egg curry", img: "images/anda kari.jpg" },
      { name: "Chicken", price: 150, veg: false, desc: "Fresh chicken curry", img: "images/chicken.jpg" },
      { name: "Biryani", price: 180, veg: false, desc: "Aromatic chicken biryani", img: "images/biryani.jpg" },
      { name: "Paneer Tikka", price: 120, veg: true, desc: "Grilled paneer with spices", img: "images/paneer tickka.jpg" },
      { name: "Gulab Jamun", price: 60, veg: true, desc: "Sweet milk dumplings", img: "images/gulabjamun.jpg" },
      { name: "Chai", price: 12, veg: true, desc: "Hot masala chai", img: "images/chai.jpg" },
      { name: "Misal Pav", price: 65, veg: true, desc: "Spicy misal with pav", img: "images/misal pav.jpg" },
      { name: "Poha", price: 45, veg: true, desc: "Onion, sev, peanuts poha", img: "images/poha.jpg" }
    ];

    function renderMenu(filtered = menu) {
      const grid = document.getElementById('menu-grid');
      grid.innerHTML = filtered.map(item => `
        <div class="card relative">
          <span class="${item.veg ? 'veg' : 'nonveg'}">${item.veg ? 'Veg' : 'Non-Veg'}</span>
          <img src="${item.img}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/300x200?text=No+Image';">
          <div class="content">
            <div class="title">${item.name}</div>
            <div class="price">₹${item.price}</div>
            <div class="desc">${item.desc}</div>
            <button class="btn" onclick="addToCart('${item.name.replace(/'/g, "\\'")}', ${item.price}, ${item.veg}, '${item.desc.replace(/'/g, "\\'")}', '${item.img.replace(/'/g, "\\'")}')">Add to Cart</button>
          </div>
        </div>
      `).join('');
    }

    function addToCart(name, price, veg, desc, img) {
      cart.push({name, price, veg, desc, img});
      document.getElementById('cart-count').textContent = cart.length;
      alert(name + " cart me add ho gaya!");
    }

    function openCart() {
      const modal = document.getElementById('cart-modal');
      const itemsDiv = document.getElementById('cart-items');
      let total = 0;
      let html = '';

      cart.forEach((item, i) => {
        total += item.price;
        html += `
          <div class="flex justify-between items-center mb-4 border-b border-gray-700 pb-2">
            <div>
              <p class="font-bold">${item.name}</p>
              <p class="text-sm text-gray-400">${item.desc}</p>
            </div>
            <div class="text-right">
              <p class="font-bold text-orange-400">₹${item.price}</p>
              <button onclick="removeItem(${i})" class="text-red-500 text-sm">Remove</button>
            </div>
          </div>
        `;
      });

      itemsDiv.innerHTML = html || '<p class="text-center text-gray-400">Cart khali hai</p>';
      document.getElementById('total-price').textContent = total;
      document.getElementById('total-price-qr').textContent = total;
      modal.style.display = 'flex';
    }

    function closeCart() {
      document.getElementById('cart-modal').style.display = 'none';
    }

    function removeItem(index) {
      cart.splice(index, 1);
      openCart();
      document.getElementById('cart-count').textContent = cart.length;
    }

    function payNow() {
      if (cart.length === 0) return alert("Cart khali hai!");

      const total = cart.reduce((sum, item) => sum + item.price, 0);
      const phone = document.getElementById('phone').value || "guest";

      // TERA REAL UPI ID YAHAN DAAL
      const upiId = "8999540672@ybl";  // ← APNA UPI ID DAAL DE

      const name = "Anand Canteen";
      const note = `Table Order - Ph: ${phone}`;

      const upiLink = `upi://pay?pa=${upiId}&pn=${encodeURIComponent(name)}&am=${total}&cu=INR&tn=${encodeURIComponent(note)}`;

      window.location.href = upiLink;

      setTimeout(() => {
        if (confirm("Payment ho gaya? Order confirm karo!")) {
          const orderId = 'order_' + Date.now();

          db.ref('orders/' + orderId).set({
            table: "—",
            items: cart,
            total: total,
            phone,
            status: "paid_upi",
            timestamp: Date.now(),
            paymentMethod: "UPI_Scan"
          }).catch(err => console.error("Firebase error:", err));

          alert("Order confirm ho gaya! Kitchen mein ja raha hai. Thank you! 🎉");
          cart = [];
          document.getElementById('cart-count').textContent = '0';
          closeCart();
        }
      }, 12000);
    }

    // Veg/Non-Veg Filter
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const filter = btn.dataset.filter;
        let filtered = menu;
        if (filter === 'veg') filtered = menu.filter(i => i.veg);
        if (filter === 'nonveg') filtered = menu.filter(i => !i.veg);
        renderMenu(filtered);
      };
    });

    // Initial render
    renderMenu();
  </script>
</body>
</html>
